<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#15803d" />
  <title>BagScan</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- SCREEN: SHOPPING -->
  <div id="screen-shop" class="screen active">

    <header class="app-header">
      <div class="header-left">
        <span class="app-name">BagScan</span>
        <span class="app-store">Sheng Siong</span>
      </div>
      <button class="icon-btn" id="history-btn" aria-label="Trip history">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </button>
    </header>

    <!-- Stats bar -->
    <div class="stats-bar">
      <div class="stat">
        <div class="stat-val" id="stat-items">0</div>
        <div class="stat-label">items</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="stat-unique">0</div>
        <div class="stat-label">unique</div>
      </div>
      <div class="stat stat-total">
        <div class="stat-val" id="stat-total">S$0.00</div>
        <div class="stat-label">est. total</div>
      </div>
    </div>

    <!-- Camera scan area -->
    <div class="scan-section" id="scan-section">
      <div class="camera-wrap" id="camera-wrap">
        <video id="camera-video" autoplay playsinline muted></video>
        <div class="scan-overlay">
          <div class="scan-corners">
            <span class="corner tl"></span>
            <span class="corner tr"></span>
            <span class="corner bl"></span>
            <span class="corner br"></span>
          </div>
          <div class="scan-line" id="scan-line"></div>
        </div>
        <div class="camera-hint" id="camera-hint">Point at barcode</div>
      </div>
      <button class="scan-toggle-btn" id="scan-toggle-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg>
        Start scanning
      </button>
    </div>

    <!-- Scan feedback toast -->
    <div class="toast" id="toast"></div>

    <!-- Price entry prompt -->
    <div class="price-prompt" id="price-prompt">
      <div class="price-prompt-inner">
        <div class="price-prompt-name" id="pp-name">Item</div>
        <div class="price-prompt-sub">Enter shelf price (S$)</div>
        <div class="price-input-row">
          <span class="price-currency">S$</span>
          <input type="number" id="price-input" min="0" step="0.01" placeholder="0.00" inputmode="decimal" />
          <button class="price-ok-btn" id="price-ok-btn">Add</button>
        </div>
        <button class="price-skip-btn" id="price-skip-btn">Skip — add without price</button>
      </div>
    </div>

    <!-- Cart -->
    <div class="cart-section">
      <div class="cart-header">
        <span class="cart-title">Cart</span>
        <button class="clear-btn" id="clear-btn">Clear all</button>
      </div>
      <div class="cart-empty" id="cart-empty">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        Tap "Start scanning" to add items
      </div>
      <div class="cart-list" id="cart-list"></div>
    </div>

    <!-- Checkout button -->
    <div class="checkout-bar">
      <button class="checkout-btn" id="checkout-btn" disabled>
        Go to checkout
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>

  </div>

  <!-- SCREEN: CHECKOUT -->
  <div id="screen-checkout" class="screen">

    <header class="app-header checkout-header">
      <button class="icon-btn" id="checkout-back-btn" aria-label="Back to cart">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="header-title">Show to kiosk</span>
      <span class="co-progress" id="co-progress">1 of 1</span>
    </header>

    <div class="co-item-info">
      <div class="co-item-name" id="co-item-name"></div>
      <div class="co-item-detail" id="co-item-detail"></div>
      <div class="co-item-price" id="co-item-price"></div>
    </div>

    <div class="barcode-wrap" id="barcode-wrap">
      <svg id="co-barcode-svg"></svg>
      <div class="barcode-digits" id="co-barcode-digits"></div>
    </div>

    <div class="brightness-hint">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      Set phone to maximum brightness
    </div>

    <div class="co-nav">
      <button class="co-nav-btn" id="co-prev-btn" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Prev
      </button>
      <button class="co-nav-btn co-nav-primary" id="co-next-btn">
        Next
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>

    <div class="co-done-banner" id="co-done-banner">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      All items scanned — proceed to payment!
    </div>

  </div>

  <!-- SCREEN: HISTORY -->
  <div id="screen-history" class="screen">
    <header class="app-header">
      <button class="icon-btn" id="history-back-btn" aria-label="Back">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="header-title">Known items</span>
      <button class="text-btn danger" id="clear-memory-btn">Clear</button>
    </header>
    <div class="history-list" id="history-list"></div>
    <div class="history-empty" id="history-empty">No items remembered yet. Start scanning!</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/barcodes/JsBarcode.ean-upc.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
